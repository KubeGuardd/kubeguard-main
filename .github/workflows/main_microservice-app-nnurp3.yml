name: Deploy Gateway and Project Service to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Prepare backend package
        run: |
          mkdir backend-package
          cp -r gateway backend-package/
          cp -r project-service backend-package/
          cp ecosystem.config.js backend-package/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: backend-package

  deploy:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: read

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'microservice-app-nnurp3'
          publish-profile: ${{ secrets.BACKEND_WEBAPP_PUBLISH_PROFILE }}
          package: .