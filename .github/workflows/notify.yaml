name: Reusable - Notify

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      stage:
        description: "Which pipeline stage is reporting — build, dev-deploy, promote-prod, rollback"
        required: true
        type: string
      status:
        description: "success or failure"
        required: true
        type: string
      image_tag:
        required: false
        type: string
        default: "n/a"
      details_url:
        description: "Link to the workflow run for full logs"
        required: false
        type: string
        default: ""
      recipients:
        description: "Comma-separated list of notification recipients"
        required: true
        type: string
    secrets:
      SMTP_SERVER:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Set email subject and color
        id: meta
        run: |
          if [ "${{ inputs.status }}" == "success" ]; then
            echo "subject=✅ [KubeGuard CI] ${{ inputs.service_name }} — ${{ inputs.stage }} succeeded" >> "$GITHUB_OUTPUT"
            echo "color=#22D3A6" >> "$GITHUB_OUTPUT"
            echo "label=SUCCESS" >> "$GITHUB_OUTPUT"
          else
            echo "subject=❌ [KubeGuard CI] ${{ inputs.service_name }} — ${{ inputs.stage }} failed" >> "$GITHUB_OUTPUT"
            echo "color=#F43F5E" >> "$GITHUB_OUTPUT"
            echo "label=FAILURE" >> "$GITHUB_OUTPUT"
          fi

      - name: Send notification email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ steps.meta.outputs.subject }}
          to: ${{ inputs.recipients }}
          from: KubeGuard CI <${{ secrets.SMTP_USERNAME }}>
          html_body: |
            <div style="font-family:sans-serif;max-width:520px;margin:0 auto;">
              <div style="background:#0D1526;padding:20px 24px;border-radius:12px 12px 0 0;">
                <span style="color:#6366F1;font-size:18px;font-weight:700;">KubeGuard CI</span>
              </div>
              <div style="border:1px solid #E2E8F0;border-top:none;padding:24px;border-radius:0 0 12px 12px;">
                <span style="display:inline-block;background:${{ steps.meta.outputs.color }};color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;">
                  ${{ steps.meta.outputs.label }}
                </span>
                <h2 style="margin:16px 0 8px;color:#0D1526;">${{ inputs.service_name }} — ${{ inputs.stage }}</h2>
                <table style="width:100%;font-size:14px;color:#475569;margin-top:12px;">
                  <tr><td style="padding:4px 0;">Service</td><td><strong>${{ inputs.service_name }}</strong></td></tr>
                  <tr><td style="padding:4px 0;">Stage</td><td><strong>${{ inputs.stage }}</strong></td></tr>
                  <tr><td style="padding:4px 0;">Image tag</td><td><code>${{ inputs.image_tag }}</code></td></tr>
                  <tr><td style="padding:4px 0;">Triggered by</td><td>${{ github.actor }}</td></tr>
                  <tr><td style="padding:4px 0;">Repository</td><td>${{ github.repository }}</td></tr>
                </table>
                <a href="${{ inputs.details_url != '' && inputs.details_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}"
                   style="display:inline-block;margin-top:20px;background:#6366F1;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;font-size:14px;">
                  View workflow run
                </a>
              </div>
            </div>