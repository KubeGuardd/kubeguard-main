name: Reusable - Promote to Production

on:
  workflow_call:
    inputs:
      helm_repo:
        required: false
        type: string
        default: "KubeGuardd/kubeguard-helm"

    secrets:
      ACR_LOGIN_SERVER:
        required: true
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true
      HELM_REPO_PAT:
        required: true
      SMTP_SERVER:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      NOTIFICATION_RECIPIENTS:
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Helm repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.helm_repo }}
          token: ${{ secrets.HELM_REPO_PAT }}
          path: helm-repo

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Promote dev tags to prod
        working-directory: helm-repo
        run: |
          git config user.name "kubeguard-ci-bot"
          git config user.email "ci-bot@kubeguard.local"

          for service in */ ; do
            service=${service%/}

            DEV_FILE="$service/values-dev.yaml"
            PROD_FILE="$service/values-prod.yaml"
            VERSION_FILE="$service/VERSION"

            if [ ! -f "$DEV_FILE" ] || [ ! -f "$PROD_FILE" ]; then
              echo "Skipping $service"
              continue
            fi

            DEV_TAG=$(yq '.image.tag' "$DEV_FILE")
            PROD_TAG=$(yq '.image.tag' "$PROD_FILE")

            if [ "$DEV_TAG" = "$PROD_TAG" ]; then
              echo "$service already promoted"
              continue
            fi

            if [ -f "$VERSION_FILE" ]; then
              CURRENT=$(cat "$VERSION_FILE")
            else
              CURRENT="0.0.0"
            fi

            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)

            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            RELEASE_TAG="v${NEW_VERSION}"

            echo "Promoting $service: $DEV_TAG -> $RELEASE_TAG"

            docker login ${{ secrets.ACR_LOGIN_SERVER }} \
              -u ${{ secrets.ACR_USERNAME }} \
              -p ${{ secrets.ACR_PASSWORD }}

            docker pull ${{ secrets.ACR_LOGIN_SERVER }}/$service:$DEV_TAG
            docker tag ${{ secrets.ACR_LOGIN_SERVER }}/$service:$DEV_TAG ${{ secrets.ACR_LOGIN_SERVER }}/$service:$RELEASE_TAG
            docker push ${{ secrets.ACR_LOGIN_SERVER }}/$service:$RELEASE_TAG

            yq -i ".image.tag = \"$RELEASE_TAG\"" "$PROD_FILE"
            echo "$NEW_VERSION" > "$VERSION_FILE"

            git add "$PROD_FILE" "$VERSION_FILE"
          done

          if git diff --cached --quiet; then
            echo "No production changes to commit"
            exit 0
          fi

          git commit -m "promote: dev images to production"
          git push