name: Promote Service to Production

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Select service to promote"
        required: true
        type: choice
        options:
          - gateway
          - frontend
          - analysis-service
          - auth-service
          - scan-service

      version:
        description: "New production version tag, example: v1.0.0"
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Helm repo
        uses: actions/checkout@v4
        with:
          repository: KubeGuardd/kubeguard-helm
          token: ${{ secrets.HELM_REPO_PAT }}
          path: helm-repo

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read dev image tag
        id: devtag
        working-directory: helm-repo
        run: |
          SERVICE="${{ github.event.inputs.service_name }}"
          DEV_FILE="$SERVICE/values-dev.yaml"

          if [ ! -f "$DEV_FILE" ]; then
            echo "ERROR: $DEV_FILE not found in kubeguard-helm repo"
            exit 1
          fi

          DEV_TAG=$(yq '.image.tag' "$DEV_FILE")

          if [ -z "$DEV_TAG" ] || [ "$DEV_TAG" = "null" ]; then
            echo "ERROR: image.tag not found in $DEV_FILE"
            exit 1
          fi

          echo "dev_tag=$DEV_TAG" >> "$GITHUB_OUTPUT"
          echo "Dev tag found: $DEV_TAG"

      - name: Docker login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull dev image, retag and push prod image
        run: |
          SERVICE="${{ github.event.inputs.service_name }}"
          DEV_TAG="${{ steps.devtag.outputs.dev_tag }}"
          PROD_TAG="${{ github.event.inputs.version }}"

          SOURCE_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/$SERVICE:$DEV_TAG"
          PROD_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/$SERVICE:$PROD_TAG"

          echo "Pulling source image: $SOURCE_IMAGE"
          docker pull "$SOURCE_IMAGE"

          echo "Retagging image: $PROD_IMAGE"
          docker tag "$SOURCE_IMAGE" "$PROD_IMAGE"

          echo "Pushing prod image: $PROD_IMAGE"
          docker push "$PROD_IMAGE"

      - name: Update prod values file
        working-directory: helm-repo
        run: |
          SERVICE="${{ github.event.inputs.service_name }}"
          PROD_TAG="${{ github.event.inputs.version }}"
          PROD_FILE="$SERVICE/values-prod.yaml"

          if [ ! -f "$PROD_FILE" ]; then
            echo "ERROR: $PROD_FILE not found in kubeguard-helm repo"
            exit 1
          fi

          OLD_PROD_TAG=$(yq '.image.tag' "$PROD_FILE")

          echo "Service: $SERVICE"
          echo "Old prod tag: $OLD_PROD_TAG"
          echo "New prod tag: $PROD_TAG"

          yq -i ".image.tag = \"$PROD_TAG\"" "$PROD_FILE"

          git config user.name "kubeguard-ci-bot"
          git config user.email "ci-bot@kubeguard.local"

          if git diff --quiet; then
            echo "No change. $SERVICE prod already has tag $PROD_TAG"
            exit 0
          fi

          git add "$PROD_FILE"
          git commit -m "promote($SERVICE): ${{ steps.devtag.outputs.dev_tag }} -> $PROD_TAG"
          git push

      - name: Notify success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ [KubeGuard CI] ${{ github.event.inputs.service_name }} production promotion succeeded"
          to: ${{ secrets.NOTIFICATION_RECIPIENTS }}
          from: KubeGuard CI <${{ secrets.SMTP_USERNAME }}>
          html_body: |
            <h2>Production Promotion Succeeded</h2>
            <p><strong>Service:</strong> ${{ github.event.inputs.service_name }}</p>
            <p><strong>Dev source tag:</strong> ${{ steps.devtag.outputs.dev_tag }}</p>
            <p><strong>Production tag:</strong> ${{ github.event.inputs.version }}</p>
            <p><strong>Triggered by:</strong> ${{ github.actor }}</p>
            <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View workflow run</a></p>

      - name: Notify failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ [KubeGuard CI] ${{ github.event.inputs.service_name }} production promotion failed"
          to: ${{ secrets.NOTIFICATION_RECIPIENTS }}
          from: KubeGuard CI <${{ secrets.SMTP_USERNAME }}>
          html_body: |
            <h2>Production Promotion Failed</h2>
            <p><strong>Service:</strong> ${{ github.event.inputs.service_name }}</p>
            <p><strong>Requested production tag:</strong> ${{ github.event.inputs.version }}</p>
            <p><strong>Triggered by:</strong> ${{ github.actor }}</p>
            <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View workflow run</a></p>
