name: Reusable - Build, Scan, and Push

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      dockerfile_path:
        required: false
        type: string
        default: "./Dockerfile"
      build_context:
        required: false
        type: string
        default: "."
      working_directory:
        required: false
        type: string
        default: "."
      node_version:
        required: false
        type: string
        default: "20"
      sonar_project_key:
        required: false
        type: string
        default: ""
      trivy_severity:
        required: false
        type: string
        default: "CRITICAL"
    secrets:
      ACR_LOGIN_SERVER:
        required: true
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true
      SONAR_TOKEN:
        required: false
      SNYK_TOKEN:
        required: false
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}
      image_full_ref:
        value: ${{ jobs.build.outputs.image_full_ref }}
      status:
        value: ${{ jobs.build.outputs.status }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
      image_full_ref: ${{ steps.vars.outputs.full_ref }}
      status: ${{ steps.final-status.outputs.result }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short=12 HEAD)
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service_name }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - working-directory: ${{ inputs.working_directory }}
        run: npm ci

      - if: ${{ inputs.sonar_project_key != '' }}
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ${{ inputs.working_directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.organization=kubeguardd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: false
          load: true
          tags: ${{ steps.vars.outputs.full_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.vars.outputs.full_ref }}
          format: table
          exit-code: "1"
          severity: ${{ inputs.trivy_severity }}
          ignore-unfixed: true

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.vars.outputs.full_ref }}
          cache-from: type=gha

      - id: final-status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi